<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#111111" />
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222222" stroke-width="1"/>
    </pattern>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35" />
      <stop offset="100%" stop-color="#ff8c42" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" />

  <g transform="translate(450, 120)">
    <rect x="0" y="140" width="16" height="50" rx="8" fill="url(#waveGrad)" />
    <rect x="30" y="90" width="16" height="150" rx="8" fill="url(#waveGrad)" />
    <rect x="60" y="40" width="16" height="250" rx="8" fill="url(#waveGrad)" />
    <rect x="90" y="0" width="16" height="330" rx="8" fill="url(#waveGrad)" />
    <rect x="120" y="20" width="16" height="290" rx="8" fill="url(#waveGrad)" />
    <rect x="150" y="60" width="16" height="210" rx="8" fill="url(#waveGrad)" />
    <rect x="180" y="100" width="16" height="130" rx="8" fill="url(#waveGrad)" />
    <rect x="210" y="130" width="16" height="70" rx="8" fill="url(#waveGrad)" />
    <rect x="240" y="110" width="16" height="110" rx="8" fill="url(#waveGrad)" />
    <rect x="270" y="140" width="16" height="50" rx="8" fill="url(#waveGrad)" />
  </g>

  <text x="120" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="80" font-weight="900" fill="#ffffff" letter-spacing="-2">web-have-sounds</text>
  <text x="120" y="540" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="24" font-weight="600" fill="#888888" letter-spacing="4" text-transform="uppercase">Procedural Web Audio Engine</text>
</svg>
